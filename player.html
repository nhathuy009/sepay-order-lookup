<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trình phát phim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; }
        video { width: 100%; height: 100%; outline: none; object-fit: contain; }
        
        /* Chỉnh lại giao diện lỗi để chứa text dài và có thể bôi đen copy */
        #error-msg { 
            color: white; 
            display: none; 
            text-align: center; 
            padding: 20px; 
            z-index: 10; 
            max-width: 90%; 
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            user-select: text; /* Cho phép bôi đen text để copy */
            word-wrap: break-word;
        }
        .debug-url { color: #f87171; font-size: 13px; margin-top: 10px; text-align: left; background: #1e293b; padding: 10px; border-radius: 4px; }
        .debug-url span { color: #34d399; font-weight: bold; }
        
        /* Giao diện thanh công cụ nổi */
        #search-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.9);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
            flex-wrap: wrap;
            justify-content: center;
        }
        #search-box:not(:hover):not(:focus-within) { opacity: 0.4; }
        #search-box input {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            outline: none;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
        }
        #search-box #accessToken { width: 140px; border: 1px solid rgba(255, 255, 255, 0.1); }
        #search-box #movieCode { width: 180px; }
        #search-box button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        #search-box button:disabled { background: #64748b; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="search-box">
        <input type="password" id="accessToken" placeholder="Mật khẩu truy cập" />
        <input type="text" id="movieCode" placeholder="Mã phim (VD: snos-056)" onkeydown="if(event.key==='Enter') fetchAndPlay()">
        <button id="playBtn" onclick="fetchAndPlay()">Xem</button>
    </div>

    <video id="video" controls autoplay playsinline></video>
    <div id="error-msg"></div>

    <script {nonce}>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.setHeaderColor('#000000');
        }

        const video = document.getElementById('video');
        const errorDiv = document.getElementById('error-msg');
        let hlsInstance = null;

        document.getElementById("accessToken").value = localStorage.getItem("sepay_access_token") || "";

        // CHÚ Ý: Thay bằng đường dẫn Cloudflare Worker Proxy của bạn
        const PROXY_BASE = "https://round-dawn-0365.nhathuy-vn.workers.dev/?url=";

        const urlParams = new URLSearchParams(window.location.search);
        const rawVidUrl = urlParams.get('vid');
        if (rawVidUrl) {
            playStream(rawVidUrl);
        }

        async function fetchAndPlay() {
            const codeInput = document.getElementById('movieCode').value.trim();
            const tokenInput = document.getElementById('accessToken').value.trim();
            
            if (!codeInput) return;

            localStorage.setItem("sepay_access_token", tokenInput);

            const btn = document.getElementById('playBtn');
            btn.disabled = true;
            btn.innerText = "Đang tìm...";
            errorDiv.style.display = 'none';
            video.style.display = 'block';

            try {
                const res = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'movie', code: codeInput, access_token: tokenInput })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    showError("❌ " + (data.error || "Lỗi API không xác định"));
                } else if (!data.stream_url) {
                    showError("❌ API trả về thành công nhưng không tìm thấy stream_url. Dữ liệu: " + JSON.stringify(data));
                } else {
                    playStream(data.stream_url);
                }
            } catch (err) {
                showError("❌ Lỗi kết nối API: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Xem";
            }
        }

        function playStream(rawUrl) {
            const vidUrl = PROXY_BASE + encodeURIComponent(rawUrl);
            errorDiv.style.display = 'none';
            video.style.display = 'block';

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ maxBufferLength: 30 });
                hlsInstance.loadSource(vidUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        showError("⚠️ HLS.js Lỗi Fatal: " + data.type + " - " + data.details, rawUrl, vidUrl);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = vidUrl;
                video.onerror = function() {
                    showError("⚠️ Lỗi phát video nguyên bản (Native Player Error).", rawUrl, vidUrl);
                };
            } else {
                showError("Trình duyệt hiện tại không hỗ trợ định dạng luồng HLS này.", rawUrl, vidUrl);
            }
        }

        function showError(msg, rawUrl = "", proxyUrl = "") {
            video.style.display = 'none';
            let htmlContent = `<b>${msg}</b>`;
            
            if (rawUrl || proxyUrl) {
                htmlContent += `<div class="debug-url">`;
                if (rawUrl) htmlContent += `<span>[RAW URL từ API]</span><br>${rawUrl}<br><br>`;
                if (proxyUrl) htmlContent += `<span>https://github.com/BH3GEI/CloudflareWorkerProxy</span><br>${proxyUrl}`;
                htmlContent += `</div>`;
            }
            
            errorDiv.innerHTML = htmlContent;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
