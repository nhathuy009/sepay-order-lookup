<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trình phát phim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.6.8/plyr.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.6.8/plyr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.3/hls.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; }
        
        /* Cấu hình màu Plyr giống trang gốc */
        :root { --plyr-color-main: #fe628e; --plyr-captions-background: rgba(0, 0, 0, 0.5); }
        .plyr { width: 100%; height: 100%; }
        
        #error-msg { color: #f87171; display: none; text-align: center; padding: 20px; z-index: 10; max-width: 90%; background: rgba(0,0,0,0.8); border-radius: 8px; }
        
        /* Thanh công cụ */
        #search-box {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20;
            display: flex; gap: 8px; background: rgba(30, 41, 59, 0.9); padding: 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); transition: opacity 0.3s; flex-wrap: wrap; justify-content: center;
        }
        #search-box:not(:hover):not(:focus-within) { opacity: 0; pointer-events: none; } /* Ẩn hoàn toàn khi không rê chuột */
        body:hover #search-box { opacity: 1; pointer-events: auto; }
        
        #search-box input { padding: 10px 14px; border: none; border-radius: 6px; outline: none; background: #0f172a; color: #e2e8f0; font-size: 14px; }
        #search-box #accessToken { width: 140px; }
        #search-box #movieCode { width: 180px; }
        #search-box button { padding: 10px 18px; border: none; border-radius: 6px; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
        #search-box button:disabled { background: #64748b; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="search-box">
        <input type="password" id="accessToken" placeholder="Mật khẩu truy cập" />
        <input type="text" id="movieCode" placeholder="Mã phim (VD: snos-056)" onkeydown="if(event.key==='Enter') fetchAndPlay()">
        <button id="playBtn" onclick="fetchAndPlay()">Xem</button>
    </div>

    <video id="video" playsinline crossorigin="anonymous"></video>
    <div id="error-msg"></div>

    <script {nonce}>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.setHeaderColor('#000000');
        }

        const video = document.getElementById('video');
        const errorDiv = document.getElementById('error-msg');
        let hlsInstance = null;
        let plyrInstance = null;

        document.getElementById("accessToken").value = localStorage.getItem("sepay_access_token") || "";

        const urlParams = new URLSearchParams(window.location.search);
        const rawVidUrl = urlParams.get('vid');
        if (rawVidUrl) { playStream(rawVidUrl); }

        async function fetchAndPlay() {
            const codeInput = document.getElementById('movieCode').value.trim();
            const tokenInput = document.getElementById('accessToken').value.trim();
            if (!codeInput) return;

            localStorage.setItem("sepay_access_token", tokenInput);
            const btn = document.getElementById('playBtn');
            btn.disabled = true; btn.innerText = "Đang tìm...";
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'movie', code: codeInput, access_token: tokenInput })
                });
                const data = await res.json();
                
                if (!res.ok) { showError("❌ " + (data.error || "Lỗi API")); }
                else if (!data.stream_url) { showError("❌ Không tìm thấy stream_url."); }
                else { playStream(data.stream_url); }
            } catch (err) { showError("❌ Lỗi kết nối API"); } 
            finally { btn.disabled = false; btn.innerText = "Xem"; }
        }

        function playStream(streamUrl) {
            errorDiv.style.display = 'none';
            
            // Xóa HLS cũ nếu có
            if (hlsInstance) { hlsInstance.destroy(); }
            
            // Cấu hình UI Plyr
            const playerSettings = {
                controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'settings', 'fullscreen', 'volume'],
                speed: { selected: 1, options: [0.5, 1, 1.25, 1.5, 2] },
                autoplay: true
            };

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ autoStartLoad: true });
                
                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.networkDetails && data.networkDetails.status === 429) {
                        hlsInstance.loadSource(streamUrl); // Tự động thử lại nếu quá tải
                    }
                });

                hlsInstance.loadSource(streamUrl);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (!plyrInstance) { plyrInstance = new Plyr(video, playerSettings); }
                    video.play();
                });
                hlsInstance.attachMedia(video);
                
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Cho iOS Safari Native
                video.src = streamUrl;
                if (!plyrInstance) { plyrInstance = new Plyr(video, playerSettings); }
                video.play();
            } else {
                showError("Trình duyệt không hỗ trợ luồng HLS.");
            }
        }

        function showError(msg) {
            errorDiv.innerHTML = `<b>${msg}</b>`;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
